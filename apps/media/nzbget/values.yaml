# https://github.com/anchorlytics/charts/blob/main/nzbget/values.yaml
# https://github.com/nzbgetcom/nzbget/releases
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nzbget-values
data:
  values.yaml: |
    image:
      tag: v26.1
    env:
    - name: PGID
      value: "100"
    securityContext:
      runAsUser: 1000
      runAsGroup: 100
    volumes:
    - name: appdata
      persistentVolumeClaim:
        claimName: nzbget
    - name: usenet
      persistentVolumeClaim:
        claimName: usenet
    volumeMounts:
    - name: usenet
      mountPath: /usenet
    ingress:
      enabled: true
      host: nzb.home.seanho.com
      annotations:
        cert-manager.io/cluster-issuer: le-prod
        nginx.ingress.kubernetes.io/proxy-body-size: 1m
