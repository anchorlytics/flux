# cf https://github.com/immich-app/immich-charts/blob/main/local/cloudnative-pg.yaml
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db
spec:
  instances: 3

  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql
    major: 18

  managed:
    roles:
      - name: immich
        superuser: true
        login: true

  storage:
    size: 8Gi
    storageClass: local-path
