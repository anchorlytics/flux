# https://github.com/metallb/metallb/tree/main/charts/metallb
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: helm-values
data:
  values.yaml: |
    controller:
      nodeSelector:
        role: ingress
    speaker:
      nodeSelector:
        role: ingress
    prometheus:
      prometheusRule:
        enabled: true
