# https://github.com/kubernetes-sigs/node-feature-discovery/tree/master/deployment/helm/node-feature-discovery
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfd
spec:
  interval: 20m
  chart:
    spec:
      interval: 2h
      sourceRef:
        kind: OCIRepository
        name: nfd
      chart: node-feature-discovery
      version: "0.2.1"
  valuesFrom:
  - kind: ConfigMap
    name: helm-values

